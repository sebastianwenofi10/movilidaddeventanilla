<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Manifiesto en Tiempo Real</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body, html { margin: 0; padding: 0; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; }

        .main-wrapper {
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, #050505 100%), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; width: 100%; display: flex; flex-direction: column;
        }

        /* DISEÑO DE FILA TÉCNICA */
        .list-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid #ffffff; /* BORDE BLANCO ORIGINAL */
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 80px 1.5fr 1fr 120px 120px;
            align-items: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .list-row:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent); }

        .header-row {
            padding: 10px 25px;
            display: grid;
            grid-template-columns: 80px 1.5fr 1fr 120px 120px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .badge-turno { padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; text-align: center; width: fit-content; }
        .m-bg { background: #3b82f6; }
        .t-bg { background: #f59e0b; }
        .n-bg { background: #8b5cf6; }

        .input-search { background: rgba(0,0,0,0.7); border: 1.5px solid #ffffff; border-radius: 15px; padding: 15px; width: 100%; color: white; text-align: center; font-weight: 800; outline: none; }
        
        #sync-indicator { font-size: 10px; font-weight: 900; color: #10b981; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        @media (max-width: 768px) {
            .list-row, .header-row { grid-template-columns: 50px 1fr 1fr; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="max-w-7xl mx-auto w-full p-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-yellow-500 rounded-lg flex items-center justify-center text-black font-black shadow-lg">U</div>
                <div>
                    <p class="font-black text-sm leading-none uppercase">Manifiesto Digital</p>
                    <div id="sync-indicator"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Sincronizado</div>
                </div>
            </div>
            <!-- BOTÓN CERRAR CORREGIDO -->
            <button onclick="cerrarVentana()" class="bg-white text-black font-black px-6 py-2 rounded-xl text-[10px] uppercase hover:bg-yellow-500 transition shadow-lg">
                <i class="fa-solid fa-circle-xmark mr-1"></i> Cerrar Lista
            </button>
        </header>

        <main class="max-w-7xl mx-auto px-6 w-full flex-grow">
            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter">Pasajeros <span class="text-yellow-500">En Tiempo Real</span></h1>
            </div>

            <div class="max-w-xl mx-auto mb-10">
                <input type="text" id="searchInput" onkeyup="filter()" placeholder="FILTRAR POR DNI O NOMBRE..." class="input-search">
            </div>

            <!-- CABECERA DE TABLA -->
            <div class="header-row hide-mobile">
                <div>ORDEN</div>
                <div>PASAJERO / DNI</div>
                <div>FACULTAD</div>
                <div>TURNO</div>
                <div class="text-right">REGISTRO</div>
            </div>

            <div id="lista-master" class="pb-20">
                <!-- Sincronización JS -->
            </div>
        </main>
    </div>

    <script>
        // LÓGICA DE CIERRE ROBUSTA
        function cerrarVentana() {
            window.close();
            // Fallback si window.close() es bloqueado por el navegador
            setTimeout(() => {
                window.location.href = "ticket.html";
            }, 100);
        }

        const L1 = "https://script.google.com/macros/s/AKfycbwzVasP01RADjpQeQjULw_XT0ypa1hrB8_Y0OJgMDpXhr7PNMT1nkYQsTjwRr03TaR0Vg/exec";
        const L2 = "https://script.google.com/macros/s/AKfycbwZQM0Ju83X3np4-DsuYc3FpyNe9ipxcgceCsPLtLAUB5vNVAlAEn4EY_2mqbKeUad_/exec";

        let ultimaData = "";

        async function syncData() {
            try {
                const res = await fetch(`${L2}?accion=obtener_lista&t=${Date.now()}`);
                const data = await res.json();
                
                if (JSON.stringify(data.lista) === ultimaData) return;
                ultimaData = JSON.stringify(data.lista);

                const container = document.getElementById('lista-master');
                container.innerHTML = "";

                data.lista.forEach(item => {
                    const shiftClass = item.turno === 'MAÑANA' ? 'm-bg' : (item.turno === 'TARDE' ? 't-bg' : 'n-bg');
                    const num = item.orden > 45 ? "🧍" : item.orden.toString().padStart(2, '0');
                    
                    const row = document.createElement('div');
                    row.className = "list-row";
                    row.id = `row-${item.dni}`;
                    row.innerHTML = `
                        <div class="font-black text-xl text-yellow-500">#${num}</div>
                        <div>
                            <p class="name-val font-black text-sm uppercase text-gray-500 animate-pulse">Sincronizando...</p>
                            <p class="text-[10px] font-mono opacity-40">DNI: ${item.dni.charAt(0)}*******</p>
                        </div>
                        <div class="fac-val text-[10px] font-bold text-gray-400 uppercase tracking-widest hide-mobile">Cargando...</div>
                        <div class="hide-mobile"><span class="badge-turno ${shiftClass}">${item.turno}</span></div>
                        <div class="text-right text-[10px] font-black text-gray-500 hide-mobile">${item.fecha}</div>
                    `;
                    container.appendChild(row);

                    fetch(`${L1}?dni=${item.dni}`).then(r => r.json()).then(st => {
                        const rEl = document.getElementById(`row-${item.dni}`);
                        if(rEl && st.found) {
                            rEl.querySelector('.name-val').innerText = st.Estudiante;
                            rEl.querySelector('.name-val').classList.remove('animate-pulse', 'text-gray-500');
                            rEl.querySelector('.fac-val').innerText = st.Facultad;
                        }
                    });
                });
            } catch(e) { console.error("Sync Error"); }
        }

        function filter() {
            let q = document.getElementById('searchInput').value.toUpperCase();
            let rows = document.getElementsByClassName('list-row');
            for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none"; }
        }

        window.onload = () => {
            syncData();
            setInterval(syncData, 10000); 
        };
    </script>
</body>
</html>
