<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Panel de Control Delegados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- LIBRERÍAS FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body { 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
        input {
            width: 100%; background: rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255,193,7,0.3) !important;
            color: white !important; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; outline: none; text-align: center;
        }
        input:focus { border-color: var(--accent) !important; }
        .btn-gold {
            background: var(--accent); color: black;
            width: 100%; padding: 15px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; transition: 0.3s;
            cursor: pointer;
        }
        .btn-gold:hover { transform: scale(1.02); background: white; }
        
        #reader {
            width: 100% !important; border: none !important;
            border-radius: 15px; overflow: hidden;
        }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        #flash-notif {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; background: #10b981; color: white; padding: 25px 50px;
            border-radius: 20px; font-weight: 900; text-align: center;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.6); display: none;
            border: 2px solid white; pointer-events: none;
        }
        .notif-error { background: #ef4444 !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.6) !important; }

        .btn-horario {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 15px 5px; border-radius: 12px;
            font-weight: 900; text-transform: uppercase; font-size: 10px;
            transition: 0.3s; cursor: pointer;
        }
        .active-6pm { background: #0284c7 !important; color: white !important; border-color: #38bdf8 !important; box-shadow: 0 0 15px rgba(2, 132, 199, 0.4); }
        .active-10pm { background: #7c3aed !important; color: white !important; border-color: #a78bfa !important; box-shadow: 0 0 15px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>

    <div id="flash-notif">
        <i id="flash-icon" class="fa-solid fa-circle-check text-5xl mb-2"></i><br>
        <span id="flash-text" class="text-2xl uppercase italic tracking-tighter">Escaneo Verificado</span>
    </div>

    <header class="w-full max-w-lg p-6 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-user-shield text-black text-lg"></i>
            </div>
            <div class="flex flex-col text-left leading-none uppercase">
                <span class="text-[10px] font-black tracking-widest leading-none">UNAC</span>
                <span class="text-[9px] text-yellow-500 font-bold">Delegados</span>
            </div>
        </div>
        <button onclick="window.close()" class="text-[10px] font-black text-gray-500 uppercase tracking-widest hover:text-red-500 transition">
            Cerrar Panel <i class="fa-solid fa-xmark ml-1"></i>
        </button>
    </header>

    <!-- LOGIN -->
    <div id="login-container" class="w-full max-w-sm px-6 mt-10 text-center animate-fade-in">
        <div class="mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Acceso <span class="text-yellow-500">Restringido</span></h1>
            <p class="text-gray-500 text-[10px] tracking-widest uppercase mt-2">Ingrese sus credenciales de delegado</p>
        </div>
        <div class="glass p-8">
            <div class="text-left mb-4">
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Documento DNI</label>
                <input type="text" id="userDni" placeholder="7XXXXXXX" maxlength="8">
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" id="userPass" placeholder="••••••••">
            </div>
            <button onclick="intentarLogin()" class="btn-gold shadow-lg shadow-yellow-500/20">Entrar al Sistema</button>
            <p id="errorLogin" class="text-red-500 text-[10px] font-bold mt-4 hidden uppercase tracking-widest">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- SCANNER PANEL -->
    <div id="scanner-container" class="w-full max-w-lg px-4 py-4 hidden animate-fade-in">
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <h2 class="text-xl font-black italic uppercase">Panel de <span class="text-yellow-500">Control</span></h2>
                <p id="delegadoNombre" class="text-gray-500 text-[9px] uppercase font-bold tracking-widest"></p>
            </div>
            <button onclick="regresarLogin()" class="bg-white/5 border border-white/10 text-[9px] px-3 py-1.5 rounded-lg font-black uppercase text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Regresar
            </button>
        </div>

        <div class="glass p-4 mb-6">
            <div id="reader"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="glass p-4 border-b-2 border-yellow-500">
                <span class="text-[8px] text-gray-500 uppercase font-black block mb-1">Mis Escaneos</span>
                <span id="contador" class="text-3xl font-black text-yellow-500">0</span>
            </div>
            <div class="glass p-4 border-b-2 border-blue-500 relative">
                <span class="text-[8px] text-gray-500 uppercase font-black block mb-1">Total Global</span>
                <span id="contador-global" class="text-3xl font-black text-blue-500">0</span>
            </div>
        </div>

        <div class="glass p-3 border-b-2 border-green-500 text-center mb-6">
            <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Estado Lector</span>
            <span id="scan-status" class="text-[10px] font-black text-green-500 uppercase">Esperando...</span>
        </div>

        <div class="glass p-6 mb-6">
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 border-b border-white/10 pb-2 flex justify-between">
                <span>Registro Local (Hoy)</span>
                <span class="text-yellow-500">Triple Sync</span>
            </h3>
            <div id="listaEscaneo" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                <p class="text-[10px] text-gray-600 italic text-center py-6">Sin registros hoy.</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button id="btn-6pm" onclick="toggleHorario('6pm')" class="btn-horario">Ticket 6:00 PM</button>
            <button id="btn-1015pm" onclick="toggleHorario('1015pm')" class="btn-horario">Ticket 10:15 PM</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="limpiarHistorial()" class="w-full bg-orange-600 text-white font-black py-4 rounded-xl uppercase text-[10px]">Borrar Historial</button>
            <button id="btn-reiniciar" onclick="enviarYReiniciar()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl uppercase text-[10px]">Reiniciar Sistema</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE LINKS
        const L1 = "https://script.google.com/macros/s/AKfycbwzVasP01RADjpQeQjULw_XT0ypa1hrB8_Y0OJgMDpXhr7PNMT1nkYQsTjwRr03TaR0Vg/exec";
        const L2 = "https://script.google.com/macros/s/AKfycbxavrdf_yymc9sdUEYuGz2qWTmzMNz0KQxEtzq6aDXlX8nL7PjXdhxBOvAyMY_jeF73/exec";
        const L3 = "https://script.google.com/macros/s/AKfycbxg1tayTgW5rVS_lBmUbzztg7XQALXsYln6-RZaISFqoFayxs43WIF7PO9ctrRaPpFy/exec"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBxaeAc2nq7iEeiLejvja3lKGwR4E09QS4",
            authDomain: "movilidad-unac.firebaseapp.com",
            databaseURL: "https://movilidad-unac-default-rtdb.firebaseio.com",
            projectId: "movilidad-unac",
            storageBucket: "movilidad-unac.firebasestorage.app",
            messagingSenderId: "245380540222",
            appId: "1:245380540222:web:d4ea08b7818bf89d682e6f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audios para feedback instantáneo
        const soundOk = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const soundError = new Audio('https://www.soundjay.com/buttons/beep-05.mp3');

        let status6pm = false, status1015pm = false;
        let scannedData = JSON.parse(localStorage.getItem('scanned_unac')) || [];
        let delegadoActivo = "", isScanningLocked = false;
        const DELEGADOS = ["71886034", "77570731", "63229248", "73438294"];

        db.ref('horarios/ticket_6pm').on('value', snap => {
            status6pm = snap.val();
            document.getElementById('btn-6pm').className = status6pm ? 'btn-horario active-6pm' : 'btn-horario';
        });
        db.ref('horarios/ticket_1015pm').on('value', snap => {
            status1015pm = snap.val();
            document.getElementById('btn-1015pm').className = status1015pm ? 'btn-horario active-10pm' : 'btn-horario';
        });

        function toggleHorario(t) {
            if(t === '6pm') db.ref('horarios/ticket_6pm').set(!status6pm);
            else db.ref('horarios/ticket_1015pm').set(!status1015pm);
        }

        function intentarLogin() {
            const dni = document.getElementById('userDni').value;
            const pass = document.getElementById('userPass').value;
            if (DELEGADOS.includes(dni) && dni === pass) {
                delegadoActivo = dni;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('scanner-container').classList.remove('hidden');
                document.getElementById('delegadoNombre').innerText = "ID Delegado: " + dni;
                iniciarSistema();
            } else {
                document.getElementById('errorLogin').classList.remove('hidden');
            }
        }

        function regresarLogin() { location.reload(); }

        function iniciarSistema() {
            renderList();
            actualizarTotalGlobal();
            setInterval(actualizarTotalGlobal, 15000);
            const scanner = new Html5QrcodeScanner("reader", { fps: 30, qrbox: 250 });
            scanner.render(onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            if (isScanningLocked) return;
            isScanningLocked = true;

            const parts = decodedText.split('-');
            if(parts.length < 4) {
                notificarFlash("QR INVÁLIDO", false);
                setTimeout(() => isScanningLocked = false, 1500);
                return;
            }
            
            const dniAlumno = parts[2];
            const turnoTicket = parts[3];

            // 1. VALIDACIÓN LOCAL (INSTANTÁNEA)
            if (scannedData.some(item => item.dni === dniAlumno)) {
                notificarFlash("YA REGISTRADO", false);
                setTimeout(() => isScanningLocked = false, 1500);
                return;
            }

            // 2. PROCESO DE VALIDACIÓN OPTIMIZADO
            try {
                // Consultamos Link 2 y Link 3 en paralelo para ahorrar tiempo
                const [resL2] = await Promise.all([
                    fetch(`${L2}?dni=${dniAlumno}&accion=solicitar_cola&turno=${turnoTicket}`).then(r => r.json())
                ]);

                if (resL2.status === "EXISTENTE" || resL2.status === "OK") {
                    // Si el ticket es válido, registramos asistencia de inmediato
                    // No esperamos a L1 (nombre) para mostrar el éxito, usamos el DNI temporalmente
                    notificarFlash("VERIFICADO ✅", true);
                    soundOk.play();

                    const nuevoRegistro = { dni: dniAlumno, nombre: "Cargando...", hora: new Date().toLocaleTimeString() };
                    scannedData.push(nuevoRegistro);
                    localStorage.setItem('scanned_unac', JSON.stringify(scannedData));
                    renderList();

                    // Ejecutamos en segundo plano (background) la actualización de nombre y la marca en L3
                    actualizarEnBackground(dniAlumno);
                    
                } else {
                    notificarFlash("SIN TICKET VÁLIDO", false);
                }
            } catch (e) {
                notificarFlash("ERROR DE RED", false);
            }
            
            // Bloqueo corto de 1.5s para agilizar el flujo de cola
            setTimeout(() => isScanningLocked = false, 1500);
        }

        async function actualizarEnBackground(dni) {
            try {
                // Marcar asistencia y obtener nombre al mismo tiempo
                const [resL1] = await Promise.all([
                    fetch(`${L1}?dni=${dni}`).then(r => r.json()),
                    fetch(`${L3}?dni=${dni}&accion=marcar_asistencia&delegado=${delegadoActivo}`)
                ]);

                if (resL1.found) {
                    const idx = scannedData.findIndex(i => i.dni === dni);
                    if (idx !== -1) {
                        scannedData[idx].nombre = resL1.Estudiante;
                        localStorage.setItem('scanned_unac', JSON.stringify(scannedData));
                        renderList();
                    }
                }
                actualizarTotalGlobal();
            } catch (e) {}
        }

        async function actualizarTotalGlobal() {
            try {
                const response = await fetch(`${L3}?accion=obtener_total`);
                const data = await response.json();
                document.getElementById('contador-global').innerText = data.total || 0;
            } catch (e) {}
        }

        function renderList() {
            document.getElementById('contador').innerText = scannedData.length;
            const lista = document.getElementById('listaEscaneo');
            if (scannedData.length === 0) return;
            lista.innerHTML = scannedData.map(item => `
                <div class="bg-white/5 p-4 rounded-xl border-l-4 border-yellow-500 mb-2 animate-fade-in">
                    <div class="flex justify-between items-start">
                        <span class="text-[11px] font-black text-white uppercase">${item.nombre !== "Cargando..." ? item.nombre : 'DNI: '+item.dni}</span>
                        <span class="text-[9px] font-bold text-yellow-500">${item.hora}</span>
                    </div>
                </div>
            `).reverse().join('');
        }

        function notificarFlash(text, exito) {
            const flash = document.getElementById('flash-notif');
            const flashText = document.getElementById('flash-text');
            flashText.innerText = text;
            
            if (exito) {
                flash.className = "";
                document.getElementById('flash-icon').className = "fa-solid fa-circle-check text-5xl mb-2";
            } else {
                flash.className = "notif-error";
                document.getElementById('flash-icon').className = "fa-solid fa-circle-xmark text-5xl mb-2";
                soundError.play();
            }
            
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 1200);
            
            const scanStatus = document.getElementById('scan-status');
            scanStatus.innerText = text;
            scanStatus.className = `text-[10px] font-black uppercase ${exito ? 'text-green-500' : 'text-red-500'}`;
        }

        function limpiarHistorial() {
            if (confirm("¿Limpiar historial local?")) {
                scannedData = [];
                localStorage.removeItem('scanned_unac');
                renderList();
            }
        }

        async function enviarYReiniciar() {
            if (confirm("⚠️ ¿REINICIAR SISTEMA? Se borrará Link 2 y Link 3.")) {
                const btn = document.getElementById('btn-reiniciar');
                btn.innerText = "REINICIANDO...";
                await Promise.all([
                    fetch(`${L2}?accion=reiniciar_sistema`),
                    fetch(`${L3}?accion=reiniciar_sistema`)
                ]);
                db.ref('horarios/ticket_6pm').set(false);
                db.ref('horarios/ticket_1015pm').set(false);
                limpiarHistorial();
                location.reload();
            }
        }
    </script>
</body>
</html>
